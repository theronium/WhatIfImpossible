<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatIfImpossible Editor</title>

<!-- KaTeX — Monaco loader.jsより前に同期ロード（AMD競合を防ぐ） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

<!-- markdown-it -->
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>

<!-- Monaco Editor -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #21253a;
    --border: #2d3155;
    --accent: #7c6af7;
    --accent2: #4ea8de;
    --text: #e2e4f0;
    --text-muted: #6b7280;
    --danger: #f87171;
    --success: #34d399;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 48px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; flex: 1; }
  .btn { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--border); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-accent:hover { background: #6857e6; }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: #3b1515; }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  aside { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
  .sidebar-header span { font-size: 12px; color: var(--text-muted); flex: 1; }
  #search { width: 100%; padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #article-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .category-label { padding: 4px 8px; margin: 8px 6px 2px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 4px; display: flex; align-items: center; gap: 6px; }
  .category-label[data-cat="cosmology"] { background: #1a2440; color: #60a5fa; border-left: 3px solid #3b82f6; }
  .category-label[data-cat="physics"]   { background: #1f1a2e; color: #c084fc; border-left: 3px solid #a855f7; }
  .category-label[data-cat="quantum"]   { background: #0f2420; color: #34d399; border-left: 3px solid #10b981; }
  .category-label[data-cat="biology"]   { background: #1a2818; color: #86efac; border-left: 3px solid #22c55e; }
  .category-label[data-cat="logic"]     { background: #2a1f10; color: #fbbf24; border-left: 3px solid #f59e0b; }
  .category-label[data-cat="philosophy"]{ background: #251525; color: #f0abfc; border-left: 3px solid #d946ef; }
  .category-label:not([data-cat])       { background: var(--surface2); color: var(--text-muted); border-left: 3px solid var(--border); }
  .article-item { padding: 6px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; border-radius: 4px; margin: 1px 4px; }
  .article-item:hover { background: var(--surface2); }
  .article-item.active { background: var(--surface2); color: var(--accent); }
  .article-id { font-size: 11px; color: var(--text-muted); width: 62px; flex-shrink: 0; font-family: monospace; }

  /* ── Editor Area ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { padding: 6px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: var(--surface); flex-shrink: 0; }
  .toolbar .file-path { font-size: 12px; color: var(--text-muted); flex: 1; font-family: monospace; }
  .mode-tabs { display: flex; gap: 2px; }
  .mode-tab { padding: 3px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; color: var(--text-muted); border: 1px solid transparent; }
  .mode-tab.active { background: var(--surface2); color: var(--text); border-color: var(--border); }

  .editor-panes { flex: 1; display: flex; overflow: hidden; }
  #monaco-container { flex: 1; min-width: 0; }
  #preview-pane { flex: 1; min-width: 0; overflow-y: auto; padding: 24px 32px; background: var(--bg); display: none; border-left: 1px solid var(--border); }
  #preview-pane.active, #monaco-container.split { display: block; }

  /* ── Preview styles ── */
  #preview-pane h1 { font-size: 26px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; }
  #preview-pane h2 { font-size: 20px; margin: 24px 0 8px; color: var(--accent2); }
  #preview-pane h3 { font-size: 16px; margin: 16px 0 6px; color: var(--text-muted); }
  #preview-pane p { line-height: 1.75; margin-bottom: 12px; }
  #preview-pane ul, #preview-pane ol { padding-left: 20px; margin-bottom: 12px; }
  #preview-pane li { line-height: 1.7; }
  #preview-pane code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-size: 13px; font-family: 'Consolas', monospace; }
  #preview-pane pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; margin-bottom: 16px; }
  #preview-pane pre code { background: none; padding: 0; }
  #preview-pane blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-muted); margin-bottom: 12px; }
  #preview-pane table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
  #preview-pane th, #preview-pane td { border: 1px solid var(--border); padding: 6px 12px; font-size: 13px; }
  #preview-pane th { background: var(--surface); }
  .katex-display { overflow-x: auto; padding: 4px 0; }

  /* ── Frontmatter card ── */
  .fm-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
  .fm-title { font-size: 22px; font-weight: 700; color: var(--text); }
  .fm-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 12px; color: var(--text-muted); }
  .fm-id { font-family: monospace; background: var(--surface2); padding: 2px 7px; border-radius: 4px; color: var(--accent); }
  .fm-category { background: var(--surface2); padding: 2px 8px; border-radius: 4px; color: var(--accent2); }
  .fm-date { margin-left: auto; }
  .fm-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .fm-tag { background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 12px; font-size: 11px; color: var(--text-muted); }

  /* ── New Article Modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 480px; display: flex; flex-direction: column; gap: 14px; }
  .modal h2 { font-size: 16px; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── Git Panel ── */
  #git-panel { background: var(--surface); border-top: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  #git-status { font-size: 12px; color: var(--text-muted); flex: 1; }
  #commit-msg { padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; width: 280px; outline: none; }
  #commit-msg:focus { border-color: var(--accent); }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 64px; right: 16px; padding: 8px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 200; }
  #toast.show { opacity: 1; }
  #toast.ok { background: var(--success); color: #000; }
  #toast.err { background: var(--danger); color: #fff; }

  /* ── Sidebar tabs ── */
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-tab { flex: 1; padding: 8px 0; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; transition: color 0.15s; letter-spacing: 0.05em; }
  .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .sidebar-tab:hover:not(.active) { color: var(--text); }

  /* ── Glossary list ── */
  .gcat-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; margin: 6px 4px 2px; border-radius: 5px; cursor: pointer; user-select: none; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; }
  .gcat-header:hover { opacity: 0.85; }
  .gcat-header .arrow { font-size: 10px; margin-left: auto; transition: transform 0.15s; }
  .gcat-header.collapsed .arrow { transform: rotate(-90deg); }
  .gcat-header .gcat-count { font-size: 11px; font-weight: 400; opacity: 0.7; }
  .gcat-terms { padding: 0 0 4px 0; }
  .gterm-row { display: flex; align-items: center; padding: 4px 10px 4px 18px; margin: 1px 4px; border-radius: 4px; gap: 6px; }
  .gterm-row:hover { background: var(--surface2); }
  .gterm-row.active { background: var(--surface2); }
  .gterm-name { flex: 1; font-size: 13px; cursor: pointer; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gterm-row.active .gterm-name { color: var(--accent2); }
  .gterm-name:hover { color: var(--accent2); }
  .gterm-en { font-size: 11px; color: var(--text-muted); }
  .btn-edit-sm { padding: 2px 7px; font-size: 11px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; flex-shrink: 0; white-space: nowrap; }
  .btn-edit-sm:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .cat-badge { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }

  /* ── Term view (preview pane) ── */
  .tv-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 20px; }
  .tv-title { font-size: 22px; font-weight: 700; }
  .tv-en { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
  .tv-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; font-size: 12px; color: var(--text-muted); align-items: center; }
  .tv-body { line-height: 1.8; margin-top: 4px; }
  .tv-body a { color: #7dd3fc; text-decoration: none; border-bottom: 1px solid #3b82f680; }
  .tv-body a:hover { color: #bae6fd; border-bottom-color: #60a5fa; }

  /* ── Article term links & popup ── */
  .term-link { border-bottom: 1px dashed #7dd3fc88; cursor: pointer; color: #93c5fd; }
  .term-link:hover { background: rgba(125,211,252,0.12); border-bottom-color: #7dd3fc; color: #bae6fd; }
  #term-popup { position: fixed; z-index: 2000; background: #1a1d27; border: 1px solid #444;
    border-radius: 10px; padding: 14px 18px; max-width: 340px; min-width: 220px;
    max-height: calc(100vh - 24px); overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: none; }
  #term-popup.visible { display: block; }
  #term-popup .tp-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  #term-popup .tp-en { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  #term-popup .tp-body { font-size: 13px; line-height: 1.7; color: #ccc; max-height: 200px; overflow-y: auto; }
  #term-popup .tp-body p { margin: 0 0 8px; }
  #term-popup .tp-body p:last-child { margin-bottom: 0; }
  #term-popup .tp-body strong { color: #e2e8f0; }
  #term-popup .tp-body code { background: #2d3148; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  #term-popup .tp-body ul, #term-popup .tp-body ol { padding-left: 16px; margin: 0 0 8px; }
  #term-popup .tp-body li { margin-bottom: 2px; }
  #term-popup .tp-footer { margin-top: 10px; display: flex; justify-content: flex-end; }
  #term-popup .tp-goto { font-size: 12px; color: #7dd3fc; cursor: pointer; background: none; border: none; padding: 0; }
  #term-popup .tp-goto:hover { text-decoration: underline; }

  /* ── Glossary form ── */
  #glossary-form-area { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #glossary-form-area.active { display: flex; }
  .gf-toolbar { padding: 6px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: var(--surface); flex-shrink: 0; }
  .gf-toolbar .gf-id { font-size: 12px; color: var(--text-muted); font-family: monospace; flex: 1; }
  .gf-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-content: start; }
  .gf-body.new-term { grid-template-columns: 1fr 1fr; }
  .gf-field { display: flex; flex-direction: column; gap: 4px; }
  .gf-field.span2 { grid-column: 1 / -1; }
  .gf-field label { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .gf-field input, .gf-field select { padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; outline: none; }
  .gf-field input:focus, .gf-field select:focus { border-color: var(--accent); }
  .gf-field textarea { padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; outline: none; resize: vertical; min-height: 260px; font-family: 'Consolas', monospace; line-height: 1.6; }
  .gf-field textarea:focus { border-color: var(--accent); }
  .gf-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── Empty state ── */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text-muted); }
  .empty p { font-size: 14px; }
</style>
<style id="cat-styles"></style>
</head>
<body>

<header>
  <h1>⚡ WhatIfImpossible Editor</h1>
  <button class="btn" id="btn-refresh">↺ 更新</button>
  <button class="btn btn-accent" id="btn-new">＋ 新規記事</button>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-panel="articles">記事</button>
      <button class="sidebar-tab" data-panel="glossary">用語集</button>
      <button class="sidebar-tab" data-panel="notes">補遺</button>
      <button class="sidebar-tab" data-panel="techtree">技術ツリー</button>
    </div>
    <div class="sidebar-header" id="articles-search-bar">
      <input id="search" type="search" placeholder="記事を検索…">
    </div>
    <div id="article-list"></div>
    <div class="sidebar-header" id="glossary-search-bar" style="display:none;">
      <input id="glossary-search" type="search" placeholder="用語を検索…">
      <button class="btn btn-accent" id="btn-new-term" style="white-space:nowrap;font-size:11px;padding:4px 8px;">＋ 追加</button>
      <button onclick="openCatModal()" title="カテゴリ管理" style="background:#2a2a2a;border:1px solid #444;border-radius:4px;color:#aaa;font-size:14px;padding:4px 7px;cursor:pointer;flex-shrink:0;">⚙</button>
    </div>
    <div id="glossary-list" style="display:none; flex:1; overflow-y:auto; padding:6px 0;"></div>
    <div class="sidebar-header" id="notes-search-bar" style="display:none;">
      <input id="notes-search" type="search" placeholder="補遺を検索…">
    </div>
    <div id="notes-list" style="display:none; flex:1; overflow-y:auto; padding:6px 0;"></div>
    <div id="techtree-panel" style="display:none; flex:1; overflow-y:auto; padding:12px;">
      <p style="color:var(--text-muted);font-size:12px;line-height:1.6;">記事間の前提・派生関係を可視化した技術ツリーです。<br>右ペインに全体マップを表示します。</p>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="file-path" id="file-path"></span>
      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="edit">編集</div>
        <div class="mode-tab" data-mode="split">分割</div>
        <div class="mode-tab" data-mode="preview">プレビュー</div>
      </div>
      <button class="btn btn-accent" id="btn-edit-viewing" style="display:none">編集</button>
      <button class="btn btn-accent" id="btn-save">保存</button>
      <button class="btn btn-danger" id="btn-delete">削除</button>
    </div>
    <div class="editor-panes" id="editor-panes">
      <div id="monaco-container"></div>
      <div id="preview-pane"></div>
      <div class="empty" id="empty-state">
        <p>左の記事一覧から選択するか、「＋ 新規記事」で作成してください</p>
      </div>
    </div>

    <!-- 用語集フォーム -->
    <div id="glossary-form-area">
      <div class="gf-toolbar">
        <span class="gf-id" id="gf-id-label">—</span>
        <button class="btn btn-danger" id="btn-delete-term" style="display:none">削除</button>
        <button class="btn btn-accent" id="btn-save-term">保存</button>
      </div>
      <div class="gf-body" id="gf-body">
        <div class="gf-field">
          <label>用語名 *</label>
          <input id="gf-name" type="text" placeholder="例: ダークマター">
        </div>
        <div class="gf-field">
          <label>英語名</label>
          <input id="gf-en" type="text" placeholder="例: Dark Matter">
        </div>
        <div class="gf-field">
          <label>よみがな *</label>
          <input id="gf-reading" type="text" placeholder="例: だーくまたー">
        </div>
        <div class="gf-field">
          <label>カテゴリ *</label>
          <select id="gf-category">
            <!-- populated dynamically from /api/glossary/categories -->
          </select>
        </div>
        <div class="gf-field">
          <label>分野</label>
          <input id="gf-field" type="text" placeholder="例: 宇宙論・素粒子物理">
        </div>
        <div class="gf-field">
          <label>関連記事</label>
          <input id="gf-related" type="text" placeholder="例: wiim_003, wiim_007">
          <span class="gf-hint">カンマ区切りで複数指定</span>
        </div>
        <div class="gf-field">
          <label>別名・エイリアス</label>
          <input id="gf-aliases" type="text" placeholder="例: グラビトン, graviton">
          <span class="gf-hint">カンマ区切りで複数指定（リンク表記ゆれ対応）</span>
        </div>
        <div class="gf-field span2">
          <label>説明文（Markdown）*</label>
          <textarea id="gf-body-text" placeholder="200〜400字程度。段落間は空行で区切る。Markdownが使えます。"></textarea>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Git Panel -->
<div id="git-panel">
  <span id="git-status">Git: —</span>
  <input id="commit-msg" type="text" placeholder="コミットメッセージ">
  <button class="btn" id="btn-git-status">状態確認</button>
  <button class="btn btn-accent" id="btn-push">Commit & Push</button>
</div>

<!-- New Article Modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h2>新規思考実験を作成</h2>
    <div class="field">
      <label>タイトル (日本語可)</label>
      <input id="f-title" type="text" placeholder="例: 光速を超えた場合の因果律">
    </div>
    <div class="field">
      <label>カテゴリ (フォルダ名)</label>
      <input id="f-category" type="text" placeholder="例: physics / logic / philosophy">
    </div>
    <div class="field">
      <label>通し番号</label>
      <input id="f-id" type="text" placeholder="例: wiim_001">
    </div>
    <div class="field">
      <label>タグ (カンマ区切り)</label>
      <input id="f-tags" type="text" placeholder="例: 相対性理論, 因果律">
    </div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">キャンセル</button>
      <button class="btn btn-accent" id="modal-create">作成</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

      <button onclick="closeCatModal()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div id="cat-list" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;"></div>
    <div style="border-top:1px solid #333;padding-top:12px;">
      <div style="font-size:12px;color:#888;margin-bottom:8px;">新規カテゴリを追加</div>

        <input id="new-cat-label" placeholder="ラベル"      style="background:#2a2a2a;border:1px solid #444;border-radius:4px;padding:4px 8px;color:#e0e0e0;font-size:12px;">
        <input id="new-cat-color" type="color" value="#60a5fa" style="width:100%;height:28px;background:#2a2a2a;border:1px solid #444;border-radius:4px;cursor:pointer;">
        <input id="new-cat-bg"    type="color" value="#1a2440" style="width:100%;height:28px;background:#2a2a2a;border:1px solid #444;border-radius:4px;cursor:pointer;">
        <button onclick="addCategory()" style="background:#3a5a3a;border:none;border-radius:4px;color:#86efac;font-size:12px;padding:4px 8px;cursor:pointer;">追加</button>
      </div>
    </div>
  </div>

<script>
// ── State ────────────────────────────────────────────────────────────
let monacoEditor = null;
let currentPath = null;
let articles = [];
let viewMode = 'edit';
let sidebarMode = 'articles'; // 'articles' | 'glossary'
let glossaryTerms = [];
let currentTermId = null;   // null = 新規
let viewingTermId = null;   // 閲覧中の用語ID
let collapsedCats = new Set(); // 折り畳み中のカテゴリ

let GLOSSARY_CATS = [];
let GLOSSARY_LABELS = {};

const FALLBACK_CATS = [
  { id: 'astronomy',   label: '天文学・宇宙論',     color: '#60a5fa', bg: '#1a2440', sort: 1 },
  { id: 'physics',     label: '物理学',             color: '#c084fc', bg: '#1f1a2e', sort: 2 },
  { id: 'mathematics', label: '数学・論理・幾何学', color: '#34d399', bg: '#181f1a', sort: 3 },
  { id: 'speculative', label: '仮説・未観測の粒子', color: '#fb923c', bg: '#1f1a18', sort: 4 },
  { id: 'philosophy',  label: '哲学・存在論',       color: '#f0abfc', bg: '#251525', sort: 5 },
  { id: 'biology',     label: '生物学・進化',       color: '#86efac', bg: '#1a2818', sort: 6 },
  { id: 'sf-concepts', label: 'SF概念',             color: '#fbbf24', bg: '#1a1f2e', sort: 7 },
];

let _toastTimer = null;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  if (!el) return;
  clearTimeout(_toastTimer);
  el.textContent = msg;
  el.className = `show ${type}`;
  _toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

async function loadCategories() {
  try {
    const res = await fetch('/api/glossary/categories');
    if (!res.ok) throw new Error('categories API not ready');
    const cats = await res.json();
    GLOSSARY_CATS = cats.sort((a, b) => a.sort - b.sort);
  } catch {
    GLOSSARY_CATS = FALLBACK_CATS;
  }
  GLOSSARY_LABELS = Object.fromEntries(GLOSSARY_CATS.map(c => [c.id, c.label]));
  injectCatStyles();
  populateCatDropdown();
}

function injectCatStyles() {
  const rules = GLOSSARY_CATS.map(c => `
    .gcat-header.${c.id} { background: ${c.bg}; color: ${c.color}; }
    .cat-badge.${c.id}   { background: ${c.bg}; color: ${c.color}; }
  `).join('');
  document.getElementById('cat-styles').textContent = rules;
}

function populateCatDropdown() {
  const sel = document.getElementById('gf-category');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = GLOSSARY_CATS.map(c =>
    `<option value="${c.id}">${c.id} — ${c.label}</option>`
  ).join('');
  if (current) sel.value = current;
}

// ── Monaco ───────────────────────────────────────────────────────────
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
require(['vs/editor/editor.main'], () => {
  monaco.editor.defineTheme('wii-dark', {
    base: 'vs-dark', inherit: true,
    rules: [],
    colors: {
      'editor.background': '#0f1117',
      'editor.lineHighlightBackground': '#1a1d27',
      'editorLineNumber.foreground': '#3d4260',
    }
  });
  monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
    language: 'markdown',
    theme: 'wii-dark',
    fontSize: 14,
    lineHeight: 22,
    wordWrap: 'on',
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    renderLineHighlight: 'line',
  });
  monacoEditor.onDidChangeModelContent(() => updatePreview());
  window.addEventListener('resize', () => monacoEditor.layout());
});

// ── Markdown renderer ────────────────────────────────────────────────
const md = window.markdownit({ html: true, linkify: true, typographer: true });

function parseFrontmatter(raw) {
  const m = raw.match(/^---\r?\n([\s\S]*?)\r?\n---/);
  if (!m) return { fm: {}, body: raw };
  const body = raw.slice(m[0].length).trimStart();
  const fm = {};
  m[1].split(/\r?\n/).forEach(line => {
    const kv = line.match(/^(\w+):\s*(.+)/);
    if (!kv) return;
    const [, k, v] = kv;
    if (v.startsWith('[')) {
      fm[k] = v.slice(1, -1).split(',').map(s => s.trim().replace(/^['"]|['"]$/g, ''));
    } else {
      fm[k] = v.replace(/^['"]|['"]$/g, '');
    }
  });
  return { fm, body };
}

function buildFmCard(fm) {
  if (!fm.title) return '';
  const tags = (fm.tags || []).map(t => `<span class="fm-tag">${t}</span>`).join('');
  return `<div class="fm-card">
    <div class="fm-title">${fm.title}</div>
    <div class="fm-meta">
      ${fm.id ? `<span class="fm-id">${fm.id}</span>` : ''}
      ${fm.category ? `<span class="fm-category">${fm.category}</span>` : ''}
      ${fm.date ? `<span class="fm-date">${fm.date}</span>` : ''}
    </div>
    ${tags ? `<div class="fm-tags">${tags}</div>` : ''}
  </div>`;
}

function renderToPane(body, pane, fm = null) {
  // Mermaid: コードブロックをプレースホルダーに変換
  let mermaidBlocks = [];
  const rendered = md.render(body.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
    const i = mermaidBlocks.length;
    mermaidBlocks.push(code.trim());
    return `<div class="mermaid-placeholder" data-idx="${i}"></div>`;
  }));
  pane.innerHTML = (fm ? buildFmCard(fm) : '') + rendered;

  // Mermaid レンダリング
  pane.querySelectorAll('.mermaid-placeholder').forEach(el => {
    const code = mermaidBlocks[el.dataset.idx];
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = code;
    el.replaceWith(div);
  });
  const mermaidNodes = pane.querySelectorAll('.mermaid');
  let mermaidPromise = Promise.resolve();
  if (mermaidNodes.length) {
    mermaidPromise = new Promise(resolve => {
      requestAnimationFrame(() => mermaid.run({ nodes: mermaidNodes }).then(resolve).catch(resolve));
    });
  }

  // KaTeX
  renderMathInElement(pane, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$', right: '$', display: false },
    ],
    throwOnError: false,
  });

  // 用語リンク化
  linkTermsInPreview(pane);

  // .md リンクをインターセプトして記事間・補遺間ナビゲーションに変換
  pane.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('http')) return;
    const mdMatch = href.match(/^(.*\.md)(#(.*))?$/);
    if (!mdMatch) return;
    a.addEventListener('click', e => {
      e.preventDefault();
      const mdPath = mdMatch[1];
      const anchor = mdMatch[3] || '';
      // glossary リンク（../glossary/xxx.md#gXXX）→ viewTerm
      if (mdPath.includes('glossary/') && /^g\d+$/.test(anchor)) {
        viewTerm(anchor);
        return;
      }
      const base = currentPath ? `http://x/${currentPath}` : 'http://x/';
      const resolved = new URL(mdPath, base).pathname.replace(/^\//, '');
      openArticle(resolved);
    });
  });

  return mermaidPromise;
}

function addSvgZoom(pane) {
  pane.querySelectorAll('.mermaid').forEach(mermaidDiv => {
    const svg = mermaidDiv.querySelector('svg');
    if (!svg) return;
    mermaidDiv.style.overflow = 'hidden';
    mermaidDiv.style.cursor = 'grab';
    mermaidDiv.style.position = 'relative';
    mermaidDiv.style.height = '420px';
    mermaidDiv.style.border = '1px solid var(--border)';
    mermaidDiv.style.borderRadius = '8px';
    mermaidDiv.style.marginBottom = '20px';
    mermaidDiv.style.background = 'var(--surface)';
    svg.style.transformOrigin = '0 0';
    svg.style.position = 'absolute';
    svg.style.top = '0';
    svg.style.left = '0';
    const hint = document.createElement('div');
    hint.textContent = 'ホイール：ズーム　ドラッグ：移動　ダブルクリック：リセット';
    hint.style.cssText = 'position:absolute;bottom:6px;right:8px;font-size:10px;color:var(--text-muted);pointer-events:none;z-index:10;';
    mermaidDiv.appendChild(hint);
    let scale = 1, tx = 0, ty = 0, dragging = false, sx, sy;
    const apply = () => { svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; };
    mermaidDiv.addEventListener('wheel', e => {
      e.preventDefault();
      scale = Math.max(0.1, Math.min(6, scale * (e.deltaY > 0 ? 0.85 : 1.15)));
      apply();
    }, { passive: false });
    mermaidDiv.addEventListener('mousedown', e => {
      dragging = true; sx = e.clientX - tx; sy = e.clientY - ty;
      mermaidDiv.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => { if (dragging) { tx = e.clientX - sx; ty = e.clientY - sy; apply(); } });
    window.addEventListener('mouseup', () => { dragging = false; mermaidDiv.style.cursor = 'grab'; });
    mermaidDiv.addEventListener('dblclick', () => { scale = 1; tx = 0; ty = 0; apply(); });
  });
}

function updatePreview() {
  if (viewMode === 'edit') return;
  const raw = monacoEditor?.getValue() ?? '';
  const pane = document.getElementById('preview-pane');
  const { fm, body } = parseFrontmatter(raw);
  renderToPane(body, pane, fm);
}

// ── Article list ─────────────────────────────────────────────────────
async function loadArticles() {
  const res = await fetch('/api/articles');
  articles = await res.json();
  renderList(articles);
}

async function loadTechtree() {
  const pane = document.getElementById('preview-pane');
  const empty = document.getElementById('empty-state');
  try {
    const res = await fetch('/api/articles/notes/tech_tree.md');
    if (!res.ok) throw new Error('tech_tree.md not found');
    const { content } = await res.json();
    empty.style.display = 'none';
    pane.style.display = 'block';
    renderToPane(content, pane).then(() => addSvgZoom(pane));
  } catch (e) {
    empty.style.display = 'none';
    pane.style.display = 'block';
    pane.innerHTML = `<p style="color:var(--text-muted)">技術ツリーを読み込めませんでした: ${e.message}</p>`;
  }
}

function renderNotesList(query = '') {
  const el = document.getElementById('notes-list');
  el.innerHTML = '';
  const q = query.toLowerCase();
  const notes = articles
    .filter(a => a.path.startsWith('notes/') && a.path !== 'notes/README.md')
    .filter(a => !q || a.title.toLowerCase().includes(q))
    .sort((a, b) => (b.birthtime || 0) - (a.birthtime || 0));
  if (!notes.length) {
    el.innerHTML = `<div style="padding:12px 16px;font-size:12px;color:var(--text-muted);">補遺なし</div>`;
    return;
  }
  notes.forEach(a => {
    const div = document.createElement('div');
    div.className = 'article-item' + (a.path === currentPath ? ' active' : '');
    div.innerHTML = `<span>${a.title}</span>`;
    div.onclick = () => openArticle(a.path);
    el.appendChild(div);
  });
}

function renderList(list) {
  const el = document.getElementById('article-list');
  el.innerHTML = '';
  const grouped = {};
  list.filter(a => !a.path.startsWith('notes/')).forEach(a => {
    const cat = (a.category === '.' ? 'index' : a.category) || 'uncategorized';
    (grouped[cat] = grouped[cat] || []).push(a);
  });
  Object.entries(grouped).sort(([a], [b]) => {
    if (a === 'index') return -1;
    if (b === 'index') return 1;
    return a.localeCompare(b);
  }).forEach(([cat, items]) => {
    const label = document.createElement('div');
    label.className = 'category-label';
    label.dataset.cat = cat;
    label.textContent = cat;
    el.appendChild(label);
    items.forEach(a => {
      const div = document.createElement('div');
      div.className = 'article-item' + (a.path === currentPath ? ' active' : '');
      div.innerHTML = `<span class="article-id">${a.id || '—'}</span><span>${a.title}</span>`;
      div.onclick = () => openArticle(a.path);
      el.appendChild(div);
    });
  });
}

// ── Open article ─────────────────────────────────────────────────────
async function openArticle(relPath, { pushState = true } = {}) {
  const res = await fetch(`/api/articles/${relPath}`);
  if (!res.ok) { showToast('読み込み失敗', 'err'); return; }
  const { raw } = await res.json();
  currentPath = relPath;
  currentGlossaryPath = null;
  monacoEditor.setValue(raw);
  document.getElementById('file-path').textContent = relPath;
  document.getElementById('toolbar').style.display = 'flex';
  const isNote = relPath.startsWith('notes/');
  document.querySelector('.mode-tabs').style.display = isNote ? 'none' : '';
  document.getElementById('btn-save').style.display = isNote ? 'none' : '';
  document.getElementById('btn-delete').style.display = isNote ? 'none' : '';
  document.getElementById('empty-state').style.display = 'none';
  if (isNote) {
    document.getElementById('monaco-container').style.display = 'none';
    document.getElementById('preview-pane').style.display = 'block';
    viewMode = 'preview';
    updatePreview();
  } else {
    setViewMode('preview');
  }
  renderList(articles);
  renderNotesList(document.getElementById('notes-search')?.value || '');
  if (pushState) history.pushState({ path: relPath }, '', `#${relPath}`);
}

// ── ブラウザ進む・戻る ────────────────────────────────────────────────
window.addEventListener('popstate', e => {
  if (e.state?.path) {
    restorePanel('articles');
    openArticle(e.state.path, { pushState: false });
  } else if (e.state?.termId) {
    restorePanel('glossary');
    viewTerm(e.state.termId, { pushState: false });
  } else if (e.state?.panel) {
    switchToPanel(e.state.panel, { pushState: false });
  }
});

// ── Save ─────────────────────────────────────────────────────────────
async function saveArticle() {
  if (!currentPath) return;
  const raw = monacoEditor.getValue();
  const res = await fetch(`/api/articles/${currentPath}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ raw })
  });
  if (res.ok) { showToast('保存しました', 'ok'); loadArticles(); }
  else showToast('保存失敗', 'err');
}

// ── Delete ───────────────────────────────────────────────────────────
async function deleteArticle() {
  if (!currentPath || !confirm(`「${currentPath}」を削除しますか？`)) return;
  await fetch(`/api/articles/${currentPath}`, { method: 'DELETE' });
  currentPath = null;
  monacoEditor.setValue('');
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  loadArticles();
  showToast('削除しました', 'ok');
}

// ── New article modal ─────────────────────────────────────────────────
document.getElementById('btn-new').onclick = () => document.getElementById('modal-overlay').classList.add('open');
document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-overlay').classList.remove('open');

document.getElementById('modal-create').onclick = async () => {
  const title    = document.getElementById('f-title').value.trim();
  const category = document.getElementById('f-category').value.trim() || 'misc';
  const id       = document.getElementById('f-id').value.trim();
  const tags     = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  if (!title) { showToast('タイトルは必須です', 'err'); return; }

  const slug = id || ('wiim_' + String(articles.length + 1).padStart(3, '0'));
  const relPath = `${category}/${slug}.md`;

  const res = await fetch('/api/articles', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ relPath, frontmatter: { title, id: slug, category, tags, date: new Date().toISOString().slice(0, 10) } })
  });
  if (res.ok) {
    document.getElementById('modal-overlay').classList.remove('open');
    await loadArticles();
    openArticle(relPath);
    showToast('記事を作成しました', 'ok');
  } else {
    const err = await res.json();
    showToast(err.error || '作成失敗', 'err');
  }
};

// ── View mode ─────────────────────────────────────────────────────────
function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  const mc = document.getElementById('monaco-container');
  const pp = document.getElementById('preview-pane');
  if (viewMode === 'edit') { mc.style.display = 'block'; pp.style.display = 'none'; }
  else if (viewMode === 'preview') { mc.style.display = 'none'; pp.style.display = 'block'; }
  else { mc.style.display = 'block'; pp.style.display = 'block'; }
  monacoEditor?.layout();
  updatePreview();
}

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.onclick = () => setViewMode(tab.dataset.mode);
});

// ── Keyboard shortcuts ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveArticle(); }
});

// ── Git ───────────────────────────────────────────────────────────────
document.getElementById('btn-git-status').onclick = async () => {
  const res = await fetch('/api/git/status');
  const status = await res.json();
  const changed = [...(status.modified || []), ...(status.not_added || []), ...(status.created || [])];
  document.getElementById('git-status').textContent =
    changed.length ? `変更: ${changed.slice(0, 3).join(', ')}${changed.length > 3 ? '…' : ''}` : 'Git: クリーン';
};

document.getElementById('btn-push').onclick = async () => {
  const msg = document.getElementById('commit-msg').value.trim() || 'Update articles';
  const res = await fetch('/api/git/push', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg })
  });
  if (res.ok) { showToast('Push 完了', 'ok'); document.getElementById('commit-msg').value = ''; }
  else { const e = await res.json(); showToast(e.error || 'Push 失敗', 'err'); }
};

// ── 記事プレビューの用語リンク化＆ポップアップ ────────────────────────
function linkTermsInPreview(pane) {
  if (!glossaryTerms.length) return;
  // 用語名＋エイリアスを展開して長さ順にソート
  const index = [];
  for (const t of glossaryTerms) {
    index.push({ name: t.name, id: t.id });
    for (const alias of (t.aliases || []))
      index.push({ name: alias, id: t.id });
  }
  index.sort((a, b) => b.name.length - a.name.length);

  // テキストノードを収集（code・pre・h1-h4・.term-link は除外）
  const walker = document.createTreeWalker(pane, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (node.parentElement?.closest('code, pre, a, .term-link, h1, h2, h3, h4, .mermaid'))
        return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  for (const node of textNodes) {
    let html = node.textContent
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const placeholders = [];
    const linked = new Set();

    for (const t of index) {
      if (linked.has(t.id)) continue;
      const escaped = t.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      if (!new RegExp(escaped).test(html)) continue;
      const ph = `\x00${placeholders.length}\x00`;
      placeholders.push(`<span class="term-link" data-term-id="${t.id}">${t.name}</span>`);
      html = html.replace(new RegExp(escaped), ph);
      linked.add(t.id);
    }
    if (!placeholders.length) continue;

    for (let i = 0; i < placeholders.length; i++)
      html = html.replace(`\x00${i}\x00`, placeholders[i]);

    const wrap = document.createElement('span');
    wrap.innerHTML = html;
    node.parentNode.replaceChild(wrap, node);
  }
}

// ── 用語ポップアップの表示 ────────────────────────────────────────────
function getTermPopup() { return document.getElementById('term-popup'); }

document.addEventListener('click', e => {
  const popup = getTermPopup();
  const link = e.target.closest('.term-link');
  if (link) {
    const t = glossaryTerms.find(t => t.id === link.dataset.termId);
    if (!t) return;
    document.getElementById('tp-name').textContent = t.name;
    document.getElementById('tp-en').textContent = t.en || '';
    document.getElementById('tp-badge').innerHTML =
      `<span class="cat-badge ${t.category}">${GLOSSARY_LABELS[t.category] || t.category}</span>`;
    document.getElementById('tp-body').innerHTML = md.render(t.body || '');
    document.getElementById('tp-goto').onclick = () => {
      popup.classList.remove('visible');
      document.querySelector('.tab-btn[data-tab="glossary"]')?.click();
      setTimeout(() => viewTerm(t.id), 100);
    };
    const rect = link.getBoundingClientRect();
    // いったん画面外に出してコンテンツ高さを測る
    popup.style.top  = '-9999px';
    popup.style.left = '-9999px';
    popup.classList.add('visible');
    const ph = popup.offsetHeight;
    const pw = popup.offsetWidth;
    const spaceBelow = window.innerHeight - rect.bottom - 8;
    const top = spaceBelow >= ph
      ? rect.bottom + 6                          // 下に十分スペースあり
      : Math.max(8, rect.top - ph - 6);          // 上に表示
    const left = Math.min(rect.left, window.innerWidth - pw - 8);
    popup.style.top  = `${top}px`;
    popup.style.left = `${Math.max(8, left)}px`;
    e.stopPropagation();
    return;
  }
  if (!e.target.closest('#term-popup')) popup?.classList.remove('visible');
});

document.addEventListener('keydown', e => {

// ── 用語本文の自動リンク化（エディタ用） ──────────────────────────────
function autoLinkBodyEditor(body, selfId) {
  // 用語名＋エイリアスを展開して長さ順にソート
  const index = [];
  for (const t of glossaryTerms) {
    index.push({ name: t.name, id: t.id });
    for (const alias of (t.aliases || []))
      index.push({ name: alias, id: t.id });
  }
  index.sort((a, b) => b.name.length - a.name.length);

  const placeholders = [];
  let result = body;
  const linked = new Set();

  for (const t of index) {
    if (t.id === selfId) continue;
    if (linked.has(t.id)) continue;
    const escaped = t.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(escaped);
    if (!regex.test(result)) continue;
    const ph = `\x00${placeholders.length}\x00`;
    placeholders.push(`[${t.name}](#${t.id})`);
    result = result.replace(regex, ph);
    linked.add(t.id);
  }
  for (let i = 0; i < placeholders.length; i++) {
    result = result.replace(`\x00${i}\x00`, placeholders[i]);
  }
  return result;
}

// ── Glossary ──────────────────────────────────────────────────────────
async function loadGlossaryTerms() {
  const res = await fetch('/api/glossary/terms');
  glossaryTerms = await res.json();
  renderGlossaryList();
}

function renderGlossaryList(query = '') {
  const el = document.getElementById('glossary-list');
  el.innerHTML = '';
  const q = query.toLowerCase();
  const filtered = glossaryTerms.filter(t =>
    !q ||
    t.name.toLowerCase().includes(q) ||
    t.reading.includes(q) ||
    (t.en || '').toLowerCase().includes(q) ||
    (t.aliases || []).some(a => a.toLowerCase().includes(q))
  );

  if (filtered.length === 0) {
    el.innerHTML = `<div style="padding:12px 16px;font-size:12px;color:var(--text-muted);">該当なし</div>`;
    return;
  }

  // 最近追加（検索なしのときのみ表示）
  if (!q) {
    const RECENT_COUNT = 10;
    const recent = [...glossaryTerms]
      .sort((a, b) => b.id.localeCompare(a.id))
      .slice(0, RECENT_COUNT);
    const recentCatId = '__recent__';
    const collapsed = collapsedCats.has(recentCatId);
    const header = document.createElement('div');
    header.className = `gcat-header${collapsed ? ' collapsed' : ''}`;
    header.style.cssText = 'background:#1a2020;color:#34d399;';
    header.innerHTML = `NEW <span class="gcat-count">(直近${RECENT_COUNT}件)</span><span class="arrow">▼</span>`;
    header.onclick = () => {
      if (collapsedCats.has(recentCatId)) collapsedCats.delete(recentCatId);
      else collapsedCats.add(recentCatId);
      renderGlossaryList(document.getElementById('glossary-search').value);
    };
    el.appendChild(header);
    if (!collapsed) {
      const group = document.createElement('div');
      group.className = 'gcat-terms';
      recent.forEach(t => {
        const row = document.createElement('div');
        const isActive = t.id === viewingTermId || t.id === currentTermId;
        row.className = 'gterm-row' + (isActive ? ' active' : '');
        row.innerHTML = `
          <span class="gterm-name" title="${t.en || ''}">${t.name}</span>
          <button class="btn-edit-sm">編集</button>`;
        row.querySelector('.gterm-name').onclick = () => viewTerm(t.id);
        row.querySelector('.btn-edit-sm').onclick = (e) => { e.stopPropagation(); editTerm(t.id); };
        group.appendChild(row);
      });
      el.appendChild(group);
    }
  }

  // カテゴリ順にグループ化
  for (const cat of GLOSSARY_CATS) {
    const terms = filtered.filter(t => t.category === cat.id);
    if (terms.length === 0) continue;

    const collapsed = collapsedCats.has(cat.id);

    // カテゴリヘッダー
    const header = document.createElement('div');
    header.className = `gcat-header ${cat.id}${collapsed ? ' collapsed' : ''}`;
    header.innerHTML = `${cat.label} <span class="gcat-count">(${terms.length})</span><span class="arrow">▼</span>`;
    header.onclick = () => {
      if (collapsedCats.has(cat.id)) collapsedCats.delete(cat.id);
      else collapsedCats.add(cat.id);
      renderGlossaryList(document.getElementById('glossary-search').value);
    };
    el.appendChild(header);

    if (collapsed) continue;

    // 用語一覧（読み順）
    const group = document.createElement('div');
    group.className = 'gcat-terms';
    const sorted = [...terms].sort((a, b) => a.reading.localeCompare(b.reading, 'ja'));
    sorted.forEach(t => {
      const row = document.createElement('div');
      const isActive = t.id === viewingTermId || t.id === currentTermId;
      row.className = 'gterm-row' + (isActive ? ' active' : '');
      row.innerHTML = `
        <span class="gterm-name" title="${t.en || ''}">${t.name}</span>
        <button class="btn-edit-sm">編集</button>`;
      row.querySelector('.gterm-name').onclick = () => viewTerm(t.id);
      row.querySelector('.btn-edit-sm').onclick = (e) => { e.stopPropagation(); editTerm(t.id); };
      group.appendChild(row);
    });
    el.appendChild(group);
  }
}

// ── 用語閲覧（プレビュー）────────────────────────────────────────────
function viewTerm(id, { pushState = true } = {}) {
  const term = glossaryTerms.find(t => t.id === id);
  if (!term) return;
  viewingTermId = id;
  if (pushState) history.pushState({ termId: id }, '', `#glossary/${id}`);
  currentTermId = null;

  // フォームを隠してエディタペインを表示
  document.getElementById('glossary-form-area').classList.remove('active');
  document.getElementById('editor-panes').style.display = 'flex';
  document.getElementById('empty-state').style.display = 'none';

  // ツールバー設定
  document.getElementById('toolbar').style.display = 'flex';
  document.querySelector('.mode-tabs').style.display = 'none';
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('btn-edit-viewing').style.display = '';
  document.getElementById('file-path').textContent = `${term.id}  ${term.name}${term.en ? '（' + term.en + '）' : ''}`;

  // プレビューペインに直接レンダリング
  const related = (term.related || []).length > 0 ? term.related.join(', ') : '—';
  const aliases = (term.aliases || []).length > 0 ? term.aliases.join(' / ') : null;
  const linkedBody = autoLinkBodyEditor(term.body || '', term.id);
  const mdBody = md.render(linkedBody);
  document.getElementById('preview-pane').innerHTML = `
    <div class="tv-card">
      <div class="tv-title">${term.name}${term.en ? `（${term.en}）` : ''}</div>
      ${term.en ? `<div class="tv-en">${term.en}</div>` : ''}
      <div class="tv-meta">
        <span class="cat-badge ${term.category}">${GLOSSARY_LABELS[term.category] || term.category}</span>
        <span>${term.field || ''}</span>
        <span style="margin-left:auto;font-family:monospace">${term.id}</span>
      </div>
      <div class="tv-meta" style="margin-top:4px">
        <span>読み: ${term.reading}</span>
        ${aliases ? `<span>別名: ${aliases}</span>` : ''}
        <span>関連: ${related}</span>
      </div>
    </div>
    <div class="tv-body">${mdBody}</div>`;

  // tv-body内のリンク（#gXXX）をクリックで用語遷移
  document.querySelector('.tv-body').querySelectorAll('a[href^="#g"]').forEach(a => {
    a.onclick = (e) => { e.preventDefault(); viewTerm(a.getAttribute('href').slice(1), { pushState: true }); };
  });

  // プレビューモード
  document.getElementById('monaco-container').style.display = 'none';
  document.getElementById('preview-pane').style.display = 'block';
  monacoEditor?.layout();
  renderGlossaryList(document.getElementById('glossary-search').value);
}

document.getElementById('btn-edit-viewing').onclick = () => {

};

function editTerm(id) {
  const term = glossaryTerms.find(t => t.id === id);
  if (!term) return;
  currentTermId = id;
  viewingTermId = null;

  document.getElementById('gf-id-label').textContent = `${term.id} / ${term.name}`;
  document.getElementById('gf-name').value = term.name || '';
  document.getElementById('gf-en').value = term.en || '';
  document.getElementById('gf-reading').value = term.reading || '';
  document.getElementById('gf-category').value = term.category || 'astronomy';
  document.getElementById('gf-field').value = term.field || '';
  document.getElementById('gf-related').value = (term.related || []).join(', ');
  document.getElementById('gf-aliases').value = (term.aliases || []).join(', ');
  document.getElementById('gf-body-text').value = term.body || '';
  document.getElementById('btn-delete-term').style.display = '';

  showGlossaryForm();
  renderGlossaryList(document.getElementById('glossary-search').value);
}

async function saveTerm() {
  const name    = document.getElementById('gf-name').value.trim();
  const reading = document.getElementById('gf-reading').value.trim();
  const body    = document.getElementById('gf-body-text').value.trim();
  if (!name || !reading || !body) { showToast('用語名・よみがな・説明文は必須です', 'err'); return; }

  const enVal = document.getElementById('gf-en').value.trim();
  const relatedRaw = document.getElementById('gf-related').value.trim();
  const aliasesRaw = document.getElementById('gf-aliases').value.trim();
  const payload = {
    name,
    en: enVal || null,
    reading,
    category: document.getElementById('gf-category').value,
    field: document.getElementById('gf-field').value.trim(),
    related: relatedRaw ? relatedRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
    aliases: aliasesRaw ? aliasesRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
    body,
  };

  const url    = currentTermId ? `/api/glossary/terms/${currentTermId}` : '/api/glossary/terms';
  const method = currentTermId ? 'PUT' : 'POST';
  const res = await fetch(url, {
    method, headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  if (res.ok) {
    const data = await res.json();
    if (!currentTermId) currentTermId = data.term.id;
    showToast('保存しました', 'ok');
    await loadGlossaryTerms();
    document.getElementById('gf-id-label').textContent = `${currentTermId} / ${name}`;
    document.getElementById('btn-delete-term').style.display = '';
  } else {
    const e = await res.json();
    showToast(e.error || '保存失敗', 'err');
  }
}

async function deleteTerm() {
  if (!currentTermId) return;
  const term = glossaryTerms.find(t => t.id === currentTermId);
  if (!confirm(`「${term?.name}」を削除しますか？`)) return;

  const res = await fetch(`/api/glossary/terms/${currentTermId}`, { method: 'DELETE' });
  if (res.ok) {
    currentTermId = null;
    viewingTermId = null;
    document.getElementById('glossary-form-area').classList.remove('active');
    document.getElementById('editor-panes').style.display = 'flex';
    document.getElementById('toolbar').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
    showToast('削除しました', 'ok');
    await loadGlossaryTerms();
  } else {
    showToast('削除失敗', 'err');
  }
}

document.getElementById('btn-save-term').onclick  = saveTerm;
document.getElementById('btn-delete-term').onclick = deleteTerm;
document.getElementById('btn-new-term').onclick    = openNewTerm;

// ── Sidebar toggle ────────────────────────────────────────────────────
// サイドバーのタブ・パネル表示のみ切り替え（コンテンツペイン非破壊）
function restorePanel(panel) {
  sidebarMode = panel;
  document.querySelectorAll('.sidebar-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.panel === panel)
  );
  const isArticles = panel === 'articles';
  const isGlossary = panel === 'glossary';
  const isNotes    = panel === 'notes';
  const isTechtree = panel === 'techtree';
  document.getElementById('articles-search-bar').style.display = isArticles ? '' : 'none';
  document.getElementById('article-list').style.display        = isArticles ? '' : 'none';
  document.getElementById('glossary-search-bar').style.display = isGlossary ? '' : 'none';
  document.getElementById('glossary-list').style.display       = isGlossary ? 'block' : 'none';
  document.getElementById('notes-search-bar').style.display    = isNotes    ? '' : 'none';
  document.getElementById('notes-list').style.display          = isNotes    ? 'block' : 'none';
  document.getElementById('techtree-panel').style.display      = isTechtree ? 'block' : 'none';
  document.querySelector('.mode-tabs').style.display = isArticles ? '' : 'none';
}

// タブクリック：コンテンツリセット＋history push
function switchToPanel(panel, { pushState = true } = {}) {
  restorePanel(panel);
  const isGlossary = panel === 'glossary';
  const isNotes    = panel === 'notes';
  const isTechtree = panel === 'techtree';

  if (pushState) {
    document.getElementById('glossary-form-area').classList.remove('active');
    document.getElementById('preview-pane').innerHTML = '';
    document.getElementById('preview-pane').style.display = 'none';
    document.getElementById('monaco-container').style.display = 'none';
    document.getElementById('editor-panes').style.display = 'flex';
    document.getElementById('toolbar').style.display = 'none';
    document.getElementById('btn-edit-viewing').style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
    currentPath = null;
    currentTermId = null;
    viewingTermId = null;
    history.pushState({ panel }, '', `#tab/${panel}`);
  }

  if (isGlossary) {
    loadGlossaryTerms();
    if (pushState) document.getElementById('glossary-search').value = '';
  } else if (isNotes) {
    if (pushState) document.getElementById('notes-search').value = '';
    renderNotesList();
  } else if (isTechtree) {
    loadTechtree();
  }
}

document.querySelectorAll('.sidebar-tab').forEach(tab => {
  tab.onclick = () => switchToPanel(tab.dataset.panel);
});

function renderCatList() {
  const list = document.getElementById('cat-list');
  list.innerHTML = GLOSSARY_CATS.map(c => `
    <div style="display:grid;grid-template-columns:1fr 1fr 80px 80px 60px 40px;gap:6px;align-items:center;">
      <span style="font-size:12px;color:#888;">${c.id}</span>
      <input value="${c.label}" onchange="updateCat('${c.id}','label',this.value)"
        style="background:#2a2a2a;border:1px solid #444;border-radius:4px;padding:3px 6px;color:#e0e0e0;font-size:12px;">
      <input type="color" value="${c.color}" onchange="updateCat('${c.id}','color',this.value)"
        style="width:100%;height:26px;background:#2a2a2a;border:1px solid #444;border-radius:4px;cursor:pointer;">
      <input type="color" value="${c.bg}" onchange="updateCat('${c.id}','bg',this.value)"
        style="width:100%;height:26px;background:#2a2a2a;border:1px solid #444;border-radius:4px;cursor:pointer;">
      <input type="number" value="${c.sort}" min="1" onchange="updateCat('${c.id}','sort',+this.value)"
        style="background:#2a2a2a;border:1px solid #444;border-radius:4px;padding:3px 6px;color:#e0e0e0;font-size:12px;width:100%;">
      <button onclick="deleteCat('${c.id}')"
        style="background:#3a1a1a;border:none;border-radius:4px;color:#f87171;font-size:12px;padding:3px 6px;cursor:pointer;">✕</button>
    </div>
  `).join('');
}

async function updateCat(id, field, value) {
  const cat = GLOSSARY_CATS.find(c => c.id === id);
  if (!cat) return;
  cat[field] = value;
  await fetch(`/api/glossary/categories/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cat)
  });
  await loadCategories();
  renderCatList();
}

async function deleteCat(id) {
  if (!confirm(`カテゴリ "${id}" を削除しますか？\n（このカテゴリの用語は残ります）`)) return;
  await fetch(`/api/glossary/categories/${id}`, { method: 'DELETE' });
  await loadCategories();
  renderCatList();
}

async function addCategory() {
  const id    = document.getElementById('new-cat-id').value.trim();
  const label = document.getElementById('new-cat-label').value.trim();
  const color = document.getElementById('new-cat-color').value;
  const bg    = document.getElementById('new-cat-bg').value;
  if (!id || !label) return alert('IDとラベルは必須です');
  const res = await fetch('/api/glossary/categories', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, label, color, bg })
  });
  if (!res.ok) { const e = await res.json(); return alert(e.error); }
  document.getElementById('new-cat-id').value = '';
  document.getElementById('new-cat-label').value = '';
  await loadCategories();
  renderCatList();
}

mermaid.initialize({ startOnLoad: false, theme: 'dark' });
(async () => {
  await loadCategories();
  await loadGlossaryTerms();  // 記事プレビューの用語リンクのために常にロード
  await loadArticles();

    openArticle(hash, { pushState: false });

})();
